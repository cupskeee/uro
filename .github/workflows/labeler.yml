# Auto-label PRs by changed paths (config: .github/labeler.yml). Uses pull_request_target so it
# has write access and works on fork PRs; labeler only reads the diff via the API — never runs PR code.
name: labeler

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
