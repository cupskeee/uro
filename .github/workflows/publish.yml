# PyPI publish (D-43, docs/14). OWNER-ACTIVATED and MANUAL by design.
#
# This workflow is inert until the owner completes a one-time PyPI setup: a "pending publisher"
# (trusted publishing / OIDC) for EACH of uro-core, uro-server, and uro-cli, all pointing at
#   owner/repo = cupskeee/uro · workflow = publish.yml · environment = pypi
# Publishing uro-cli requires uro-server and uro-core on PyPI too (uro-cli imports uro-server
# for `uro serve`), so all three ship together — they are single-versioned across the workspace.
#
# Order of operations for a release (see docs/14 "Publishing to PyPI"):
#   1. `just release X.Y.Z` (bumps the three pyprojects + CHANGELOG, tags, pushes) — cuts the
#      GitHub Release via release.yml.
#   2. Run this workflow (Actions → publish → Run workflow) to upload the built artifacts.
#
# No API tokens: PyPI trusted publishing authenticates via the job's OIDC identity. No
# third-party marketplace actions — uv is installed with pip on the runner.
name: publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI trusted publishing — no stored token
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Build all three packages
        run: |
          uv build --package uro-core
          uv build --package uro-server
          uv build --package uro-cli
      - name: Publish to PyPI (trusted publishing)
        run: uv publish
