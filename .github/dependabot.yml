# Dependabot version updates (routine bumps). Security ALERTS + fixes are enabled separately
# in repo settings and need no config. Grouped + weekly to avoid PR spam.
version: 2
updates:
  # GitHub Actions pinned in ci.yml / release.yml / labeler.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
  # Python dependencies across the uv workspace.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
