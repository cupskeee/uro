<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1280px; height: 640px; overflow: hidden; background: #0a0f1e; }
  body { width: 1280px; height: 640px; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1100px 700px at 82% -12%, rgba(56,189,248,0.16), transparent 60%),
      radial-gradient(900px 700px at 8% 118%, rgba(251,146,60,0.14), transparent 60%),
      linear-gradient(140deg, #0b1020 0%, #0d1326 55%, #0a0f1e 100%);
    color: #e7ecf5;
    padding: 60px 80px;
    display: flex; flex-direction: column; justify-content: center; gap: 54px;
    position: relative;
  }
  .grid { position:absolute; inset:0; background-image:
      linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
    background-size: 46px 46px; }
  .top { position: relative; }
  .eyebrow { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 22px;
    letter-spacing: 3px; text-transform: uppercase; color: #7dd3fc; font-weight: 600; }
  h1 { font-size: 116px; line-height: 1.0; font-weight: 800; letter-spacing: -3px;
    margin-top: 14px; color: #f8fafc; }
  h1 .dot { color: #fb923c; }
  .tagline { font-size: 41px; font-weight: 650; margin-top: 22px; color: #cbd5e1; }
  .tagline b { color: #fdba74; font-weight: 750; }
  .analogy { position: relative; display: flex; gap: 14px; margin-top: 30px;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 23px; color: #94a3b8; }
  .analogy span { background: rgba(148,163,184,0.10); border: 1px solid rgba(148,163,184,0.18);
    padding: 9px 15px; border-radius: 10px; }
  .analogy b { color: #e2e8f0; font-weight: 600; }
  .bottom { position: relative; display: flex; align-items: center; justify-content: space-between; }
  .pills { display: flex; gap: 12px; }
  .pill { font-size: 22px; font-weight: 650; padding: 9px 18px; border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.22); color: #cbd5e1; background: rgba(148,163,184,0.06); }
  .pill.accent { border-color: rgba(251,146,60,0.5); color: #fdba74; background: rgba(251,146,60,0.10); }
  .repo { font-family: "SF Mono", ui-monospace, Menlo, monospace; font-size: 24px; color: #64748b; }
  .mark {
    position: absolute; top: 54px; right: 66px;
    width: 260px; height: 260px; border-radius: 34px;
    background-image: url("URO_Engine_logo.png");
    background-repeat: no-repeat;
    background-size: 890px auto;          /* scale the 1280-wide logo down */
    background-position: -320px -28px;    /* center just the ouroboros/∞ symbol, wordmark clipped */
    border: 1px solid rgba(96,131,181,0.28);
    box-shadow: 0 24px 60px rgba(0,0,0,0.40);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="mark"></div>
  <div class="top">
    <div class="eyebrow">A world-state engine · headless · embeddable</div>
    <h1>Uro Engine<span class="dot">.</span></h1>
    <div class="tagline"><b>Worlds that remember.</b> Timelines that fork.</div>
    <div class="analogy">
      <span>persistent <b>world state</b></span>
      <span>versioned <b>timelines</b></span>
      <span>forkable <b>what-ifs</b></span>
      <span>truth <b>vs. belief</b></span>
    </div>
  </div>
  <div class="bottom">
    <div class="pills">
      <div class="pill accent">MIT</div>
      <div class="pill">Python 3.12</div>
      <div class="pill">Postgres + pgvector</div>
      <div class="pill">v0.1.0</div>
    </div>
    <div class="repo">github.com/cupskeee/uro</div>
  </div>
</body>
</html>
