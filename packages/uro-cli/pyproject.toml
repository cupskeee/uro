[project]
name = "uro-cli"
version = "0.2.0"
description = "Uro Engine reference client — play, dry-run, and dev tools against the engine"
license = "MIT"
license-files = ["LICENSE"]
readme = "README.md"
authors = [{ name = "cupskeee" }]
requires-python = ">=3.12"
# The reference client drives the whole engine: it wires the Postgres store and the LLM
# providers, so it pulls both uro-core extras (D-43). The internal deps are pinned to the exact
# lockstep version (the workspace is single-versioned) so a partial `pip install --upgrade` can't
# pair a new uro-cli with an old uro-core; `just release` bumps all three together, and the
# `{workspace = true}` sources make a drifted pin fail `uv sync` locally.
dependencies = [
    "uro-core[postgres,llm]==0.2.0",
    "uro-server==0.2.0",
    "typer>=0.15",
    "rich>=13.9",
    "websockets>=16.1",
]

[project.urls]
Homepage = "https://github.com/cupskeee/uro"
Repository = "https://github.com/cupskeee/uro"
Issues = "https://github.com/cupskeee/uro/issues"

[project.scripts]
uro = "uro_cli.main:app"

[tool.uv.sources]
uro-core = { workspace = true }
uro-server = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_cli"]
