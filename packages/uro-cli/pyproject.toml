[project]
name = "uro-cli"
version = "0.0.1"
description = "Uro Engine reference client — play, dry-run, and dev tools against the engine"
requires-python = ">=3.12"
dependencies = [
    "uro-core",
    "typer>=0.15",
    "rich>=13.9",
]

[project.scripts]
uro = "uro_cli.main:app"

[tool.uv.sources]
uro-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_cli"]
