[project]
name = "uro-cli"
version = "0.1.0"
description = "Uro Engine reference client — play, dry-run, and dev tools against the engine"
license = "MIT"
authors = [{ name = "cupskeee" }]
requires-python = ">=3.12"
dependencies = [
    "uro-core",
    "uro-server",
    "typer>=0.15",
    "rich>=13.9",
    "websockets>=14",
]

[project.urls]
Homepage = "https://github.com/cupskeee/uro"
Repository = "https://github.com/cupskeee/uro"
Issues = "https://github.com/cupskeee/uro/issues"

[project.scripts]
uro = "uro_cli.main:app"

[tool.uv.sources]
uro-core = { workspace = true }
uro-server = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_cli"]
