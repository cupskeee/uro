[project]
name = "uro-server"
version = "0.2.0"
description = "Uro Engine headless server — thin FastAPI shell over uro-core (REST + WebSocket)"
license = "MIT"
license-files = ["LICENSE"]
readme = "README.md"
authors = [{ name = "cupskeee" }]
requires-python = ">=3.12"
# The transport shell imports no adapter itself, but a deployed play server needs the store
# and a provider at runtime, so it pulls both uro-core extras (D-43). uro-core is pinned to the
# exact lockstep version (single-versioned workspace) so a partial upgrade can't mismatch them;
# `just release` bumps all three together and `{workspace = true}` fails `uv sync` on a drift.
dependencies = [
    "uro-core[postgres,llm]==0.2.0",
    "fastapi>=0.115",
    "python-multipart>=0.0.9",  # FastAPI file/form parsing — the BE-6 pack-upload endpoint
    "uvicorn[standard]>=0.51.0",
]

[project.urls]
Homepage = "https://github.com/cupskeee/uro"
Repository = "https://github.com/cupskeee/uro"
Issues = "https://github.com/cupskeee/uro/issues"

[tool.uv.sources]
uro-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_server"]
