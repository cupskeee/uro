[project]
name = "uro-server"
version = "0.0.1"
description = "Uro Engine headless server — thin FastAPI shell over uro-core (REST + WebSocket)"
requires-python = ">=3.12"
dependencies = [
    "uro-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[tool.uv.sources]
uro-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_server"]
