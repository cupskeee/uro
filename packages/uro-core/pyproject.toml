[project]
name = "uro-core"
version = "0.1.0"
description = "Uro Engine core library — persistent, AI-driven RPG world engine (embeddable, headless)"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "asyncpg>=0.30",
    "pgvector>=0.3",
    "python-ulid>=2.7",
    "jinja2>=3.1",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_core"]
