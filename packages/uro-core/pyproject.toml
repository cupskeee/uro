[project]
name = "uro-core"
version = "0.1.0"
description = "Uro Engine core library — persistent, AI-driven RPG world engine (embeddable, headless)"
license = "MIT"
authors = [{ name = "cupskeee" }]
keywords = ["ai", "llm", "rpg", "game-engine", "event-sourcing", "worldbuilding"]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
    "asyncpg>=0.30",
    "pgvector>=0.5.0",
    "python-ulid>=2.7",
    "jinja2>=3.1",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/cupskeee/uro"
Repository = "https://github.com/cupskeee/uro"
Issues = "https://github.com/cupskeee/uro/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uro_core"]
