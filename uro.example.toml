# Deployment configuration template — copy to uro.toml (gitignored) and edit.
# Precedence: env vars (URO_*) > uro.toml > world-pack suggestions > engine defaults.
# Secrets are REFERENCES (env var names / keychain), never values. docs/14, docs/04.

[database]
url = "postgresql://uro:uro@localhost:5433/uro" # 5433: see docker-compose.yml port note

[server]
mode = "local" # local | token (docs/08)

# --- LLM role bindings (read by the CLI wiring) ---
# Each role -> "kind:model" (or bare "kind"). Kinds: stub | local | openai | anthropic.
# `uro play --provider X` is the default for any role NOT pinned here.
# Secrets come from ENV, not this file: ANTHROPIC_API_KEY, OPENAI_API_KEY; the local
# (Ollama) base url from URO_LOCAL_BASE_URL; a fallback embed model from URO_EMBED_MODEL.
[llm.roles]
narrator = "anthropic:claude-sonnet-5"
dialogue = "anthropic:claude-sonnet-5"
extractor = "openai:gpt-4o-mini"            # cheaper model for high-volume structured output
summarizer = "openai:gpt-4o-mini"
embedder = "openai:text-embedding-3-small"  # MUST be an embedding model, not a chat model
# planner / judge arrive with later phases (D-28, D-24).

# NOTE: a [llm.providers] section for per-provider api_key_env / base_url is reserved for
# the Phase 5 server config; the Phase 1 CLI does not read it yet — keys and base urls
# come from the env vars named above.
